<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Taller Mecánico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4a0e0e 0%, #8b1e1e 50%, #4a0e0e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .login-wrapper {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 2.5rem;
        }
        .logo-container img {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .login-header {
            background: linear-gradient(90deg, #8B0000, #A52A2A);
            color: white;
            padding: 2.5rem 1.5rem;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-body {
            padding: 2.5rem 2rem 2rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.85rem 1.2rem;
            border: 1px solid #ccc;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #8B0000;
            box-shadow: 0 0 0 0.25rem rgba(139, 0, 0, 0.25);
        }
        .btn-login {
            background: linear-gradient(90deg, #8B0000, #A52A2A);
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.4);
        }
        .forgot-link {
            color: #8B0000;
            font-weight: 500;
            text-decoration: none;
        }
        .forgot-link:hover {
            color: #A52A2A;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/camion-login.png') }}" alt="Camión Taller Mecánico">
        </div>

        <div class="login-card">
            <div class="login-header">
                <h2>LTH</h2>
                <h5>Transportadora</h5>
            </div>

            <div class="login-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label">Correo Electrónico</label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="ejemplo@tallermecanico.com" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100 text-white mb-3">
                        Iniciar Sesión
                    </button>

                    <div class="text-center">
                        <a href="#" class="forgot-link small">¿Olvidaste tu contraseña?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
